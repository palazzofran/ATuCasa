<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATuCasa — Menú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

<script src="../static/js/api.js"></script>
<script src="../static/js/auth.js"></script>
<script src="../static/js/carrito.js"></script>
<script src="../static/js/navbar.js"></script>

<div class="wrap">
  <div id="info-local"><div class="spinner"></div></div>
  <div id="menu-productos"></div>
  <div style="height:100px"></div>
</div>

<a href="./checkout.html" class="cart-pill hidden" id="cart-pill">
  <div class="cart-count">0</div>
  <span class="cart-txt">Ver mi pedido</span>
  <span class="cart-price">$0</span>
  <i class="fa-solid fa-chevron-right cart-arrow"></i>
</a>

<script>
const idLocal = parseInt(new URLSearchParams(window.location.search).get('id'));

const EMOJI_CATEGORIA = {
  comida:'🍽️', hamburguesas:'🍔', pizza:'🍕', sushi:'🍣',
  mercado:'🛒', farmacia:'💊', postres:'🍰', bebidas:'🥤',
};

async function cargarLocal() {
  if (!idLocal) {
    document.getElementById('info-local').innerHTML = `
      <div class="empty-state"><i class="fa-solid fa-circle-xmark"></i>
        <h3>Local no encontrado</h3><p><a href="../index.html" class="form-link">Volver al inicio</a></p>
      </div>`;
    return;
  }

  try {
    const local = await api.get(`/locales/${idLocal}`);
    document.title = `ATuCasa — ${local.nombre}`;
    localStorage.setItem('atc_local_id', idLocal);

    const img = local.imagen_url || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1200&q=80';
    const envio = local.envio_gratis ? '<span style="color:var(--emerald)">Envío gratis</span>' : `Envío $${(local.costo_envio||350).toLocaleString('es-AR')}`;

    document.getElementById('info-local').innerHTML = `
      <div class="local-hero">
        <img src="${img}" alt="${local.nombre}" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1200&q=80'">
        <div class="local-hero-info">
          <h1>${local.nombre}</h1>
          <div class="local-hero-meta">
            <span><i class="fa-solid fa-tag"></i> ${local.categoria || 'General'}</span>
            <span><i class="fa-regular fa-clock"></i> ${local.tiempo_entrega || '25–40'} min</span>
            <span><i class="fa-solid fa-motorcycle"></i> ${envio}</span>
            <span><i class="fa-solid fa-star" style="color:#f59e0b"></i> ${local.rating || '4.7'}</span>
          </div>
        </div>
      </div>
      ${local.descripcion ? `<p style="color:var(--text-secondary);font-size:14px;margin-bottom:8px">${local.descripcion}</p>` : ''}
    `;

    const contenedor = document.getElementById('menu-productos');
    const productos = local.productos || [];

    if (productos.length === 0) {
      contenedor.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-bowl-food"></i>
          <h3>Sin productos disponibles</h3>
          <p>Este local aún no cargó su menú</p>
        </div>`;
      return;
    }

    // Agrupar por categoría si existe, sino mostrar todos juntos
    const grupos = {};
    productos.forEach(p => {
      if (!p.disponible) return;
      const grp = p.categoria_menu || 'Menú';
      if (!grupos[grp]) grupos[grp] = [];
      grupos[grp].push(p);
    });

    Object.entries(grupos).forEach(([grupo, items]) => {
      contenedor.innerHTML += `<div class="menu-section-title">${grupo}</div>`;
      items.forEach(prod => {
        const qty = getCantidadProducto(prod.id);
        contenedor.innerHTML += `
          <div class="product-card" id="prod-${prod.id}">
            <div class="product-info">
              <div class="product-name">${prod.nombre}</div>
              ${prod.descripcion ? `<div class="product-desc">${prod.descripcion}</div>` : ''}
              <div class="product-price">$${prod.precio.toLocaleString('es-AR')}</div>
              <div class="qty-control" id="qty-${prod.id}">
                ${qty === 0
                  ? `<button class="btn-order" onclick="agregar(${prod.id},'${prod.nombre.replace(/'/g,"\\'")}',${prod.precio})">
                       <i class="fa-solid fa-plus"></i> Agregar
                     </button>`
                  : `<button class="qty-btn" onclick="quitar(${prod.id})">−</button>
                     <span class="qty-num">${qty}</span>
                     <button class="qty-btn" onclick="agregar(${prod.id},'${prod.nombre.replace(/'/g,"\\'")}',${prod.precio})">+</button>`
                }
              </div>
            </div>
            ${prod.imagen_url
              ? `<img class="product-img" src="${prod.imagen_url}" alt="${prod.nombre}" loading="lazy">`
              : `<div class="product-img-placeholder">${EMOJI_CATEGORIA[local.categoria] || '🍽️'}</div>`
            }
          </div>`;
      });
    });

  } catch (e) {
    document.getElementById('info-local').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-plug-circle-exclamation"></i>
        <h3>Error al cargar el local</h3>
        <p><a href="../index.html" class="form-link">Volver al inicio</a></p>
      </div>`;
  }
}

function agregar(id, nombre, precio) {
  agregarAlCarrito(id, nombre, precio);
  _renderQty(id);
}

function quitar(id) {
  quitarDelCarrito(id);
  _renderQty(id);
}

function _renderQty(id) {
  const el = document.getElementById(`qty-${id}`);
  if (!el) return;
  const qty = getCantidadProducto(id);
  const prod = carrito.find(i => i.id === id) || {};
  if (qty === 0) {
    el.innerHTML = `<button class="btn-order" onclick="agregar(${id},'${(prod.nombre||'').replace(/'/g,"\\'")}',${prod.precio||0})">
      <i class="fa-solid fa-plus"></i> Agregar</button>`;
  } else {
    el.innerHTML = `<button class="qty-btn" onclick="quitar(${id})">−</button>
      <span class="qty-num">${qty}</span>
      <button class="qty-btn" onclick="agregar(${id},'${(prod.nombre||'').replace(/'/g,"\\'")}',${prod.precio||0})">+</button>`;
  }
}

cargarLocal();
</script>

</body>
</html>
