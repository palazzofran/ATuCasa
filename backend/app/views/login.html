<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATuCasa - Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 420px;">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4 text-center">Iniciar sesión</h3>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="input-email" class="form-control" placeholder="tu@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="input-password" class="form-control" placeholder="••••••••">
            </div>

            <div id="error-login" class="alert alert-danger d-none"></div>

            <button id="btn-login" class="btn btn-primary w-100">Ingresar</button>
            <p class="text-center mt-3 mb-0 text-muted small">
                ¿No tenés cuenta? <a href="./registro.html">Registrate</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            const errorDiv = document.getElementById('error-login');

            try {
                await login(email, password);
                // Redirigir a donde venía o al inicio
                const returnTo = new URLSearchParams(window.location.search).get('next') || '../index.html';
                window.location.href = returnTo;
            } catch (e) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = e.message || 'Email o contraseña incorrectos';
            }
        });
    </script>
</body>
</html>
