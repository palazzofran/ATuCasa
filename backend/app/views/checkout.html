<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATuCasa - Confirmar Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4">Confirmar Pedido</h2>

        <div class="row">
            <div class="col-md-7">
                <div class="card shadow-sm p-4 mb-4">
                    <h5 class="mb-3">Dirección de entrega</h5>
                    <input type="text" id="input-direccion" class="form-control" placeholder="Ej: Av. Siempreviva 742, Springfield">
                </div>

                <div class="card shadow-sm p-4">
                    <h5 class="mb-3">Resumen del pedido</h5>
                    <div id="resumen-checkout"></div>
                    <hr>
                    <h5 class="text-end">Total: $<span id="total-checkout">0</span></h5>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm p-4">
                    <h5 class="mb-3">¿No estás registrado?</h5>
                    <p class="text-muted small">Iniciá sesión o registrate para confirmar tu pedido.</p>
                    <a href="../views/login.html" class="btn btn-outline-primary w-100 mb-2">Iniciar sesión</a>
                    <a href="../views/registro.html" class="btn btn-outline-secondary w-100">Registrarse</a>
                    <hr>
                    <div id="usuario-logueado" class="d-none">
                        <p class="mb-2">Pedido como: <strong id="nombre-usuario"></strong></p>
                        <button id="btn-confirmar" class="btn btn-success w-100">Confirmar Pedido</button>
                    </div>
                    <div id="mensaje-pedido" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/carrito.js"></script>
    <script src="../js/checkout.js"></script>
</body>
</html>
