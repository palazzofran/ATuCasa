<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATuCasa - Registrarse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 440px;">
        <div class="card shadow-sm p-4">
            <h3 class="mb-4 text-center">Crear cuenta</h3>

            <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" id="input-nombre" class="form-control" placeholder="Juan García">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="input-email" class="form-control" placeholder="tu@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="input-password" class="form-control" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="mb-3">
                <label class="form-label">Teléfono (opcional)</label>
                <input type="tel" id="input-telefono" class="form-control" placeholder="11 1234-5678">
            </div>

            <div id="error-registro" class="alert alert-danger d-none"></div>
            <div id="exito-registro" class="alert alert-success d-none">¡Cuenta creada! Redirigiendo...</div>

            <button id="btn-registro" class="btn btn-primary w-100">Registrarse</button>
            <p class="text-center mt-3 mb-0 text-muted small">
                ¿Ya tenés cuenta? <a href="./login.html">Iniciá sesión</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('btn-registro').addEventListener('click', async () => {
            const nombre = document.getElementById('input-nombre').value;
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            const telefono = document.getElementById('input-telefono').value;
            const errorDiv = document.getElementById('error-registro');
            const exitoDiv = document.getElementById('exito-registro');

            try {
                await registro({ nombre, email, password, telefono, rol: 'cliente' });
                exitoDiv.classList.remove('d-none');
                errorDiv.classList.add('d-none');
                setTimeout(() => window.location.href = '../index.html', 1500);
            } catch (e) {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = e.message || 'Error al registrarse';
            }
        });
    </script>
</body>
</html>
